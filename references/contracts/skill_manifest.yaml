version: 1
canonical_source: references/contracts/skill_manifest.yaml

routing:
  task_workflow:
    auth: references/workflows/auth.md
    api_sdk: references/workflows/api_sdk.md
    terraform_iac: references/workflows/terraform_iac.md
    troubleshooting: references/workflows/troubleshooting.md
    inventory: references/workflows/inventory.md
    billing_detail: references/workflows/billing_detail.md
    mcp_setup: references/workflows/mcp_setup.md

languages:
  profiles:
    python: references/languages/python.md
    go: references/languages/go.md
    nodejs: references/languages/nodejs.md
    java: references/languages/java.md
    dotnet: references/languages/dotnet.md
    cli: references/languages/cli.md
    terraform: references/languages/terraform.md

output:
  envelope_v2:
    version: "2.0"
    required_fields:
      - version
      - status
      - data
      - checks
      - limitations
      - sources
      - errors

yc_cli_policy:
  preflight_commands:
    - yc config profile list
    - yc iam whoami
  profile_confirmation_template: "Сейчас в YC CLI активен профиль <profile>. Всё верно, продолжаем?"
  read_only_verbs:
    - list
    - get
    - describe
    - logs
  mutating_verbs:
    - create
    - update
    - delete
    - start
    - stop
    - restart
    - attach
    - detach
    - set
    - add
    - remove
  forbidden_secret_commands:
    - yc config list
    - yc config get
    - yc config profile get
  safety_rules:
    - "Перед mutating-командами нужно явное подтверждение пользователя."
    - "Не печатать значения token/private_key."
    - "Для типа профиля показывать только маркеры service-account-key|federation-id|token."

sources_policy:
  default_docs_language: ru
  prefer_ru_docs: true
  tiers:
    tier1:
      - https://github.com/yandex-cloud/cloudapi
      - https://yandex.cloud/ru/docs
      - https://github.com/yandex-cloud/terraform-provider-yandex
      - https://github.com/yandex-cloud/python-sdk
      - https://github.com/yandex-cloud/go-sdk
      - https://github.com/yandex-cloud/nodejs-sdk
      - https://github.com/yandex-cloud/java-sdk
      - https://github.com/yandex-cloud/dotnet-sdk
      - https://yandex.cloud/ru/docs/iam/concepts/authorization/
      - https://yandex.cloud/ru/docs/cli/cli-ref/
      - https://yandex.cloud/ru/docs/tutorials/
      - https://yandex.cloud/ru/docs/troubleshooting/
    tier2:
      - https://github.com/yandex-cloud-examples
    tier3:
      - https://nikolaymatrosov.ru/

auth_decision_table:
  credential_types:
    - iam_token
    - api_key
    - static_access_key
    - authorized_key
    - oauth_token
  defaults:
    workload_overrides:
      aws_compatible_api: static_access_key
      marketplace_integration: authorized_key
    principal_defaults:
      service_account: iam_token
      non_service_account: iam_token
  service_account_iam_token_tree:
    - field: runs_on_vm
      when_true: vm_metadata_token
      when_false: external_oidc
    - field: external_oidc
      when_true: workload_identity_federation
      when_false: runs_in_cloud_functions
    - field: runs_in_cloud_functions
      when_true: cloud_functions_runtime_token
      when_false: external_with_yc_cli
    - field: external_with_yc_cli
      when_true: yc_cli_create_token
      when_false: need_full_control
    - field: need_full_control
      when_true: jwt_exchange_manual
      when_false: jwt_exchange_manual
  methods:
    vm_metadata_token:
      rotation_mode: runtime
      summary: "Сервисный аккаунт ВМ через metadata service."
    workload_identity_federation:
      rotation_mode: scheduled
      summary: "Обмен внешнего OIDC subject token на IAM token."
    cloud_functions_runtime_token:
      rotation_mode: runtime
      summary: "Токен выдается runtime Cloud Functions."
    yc_cli_create_token:
      rotation_mode: manual
      summary: "Токен через yc iam create-token после preflight."
    jwt_exchange_manual:
      rotation_mode: scheduled
      summary: "Ручной JWT -> IAM token exchange через IAM Token API."

mcp:
  source_repo: https://github.com/yandex-cloud/mcp
  catalog_path: references/mcp/catalog.yaml
  registry_path: references/mcp/registry.md
  tools_reference: https://github.com/yandex-cloud/mcp/blob/master/servers/toolkit-mcp-server/README.md#tools
